name: Rust

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_HOST: localhost
  POSTGRES_DB: postgres
  LIPL_USERNAME: ${{ secrets.LIPL_USERNAME }}
  LIPL_PASSWORD: ${{ secrets.LIPL_PASSWORD }}
  WORKSPACE: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Install musl-tools
        run: sudo apt install -u musl-tools
      - name: Install rust musl target
        run: rustup target add x86_64-unknown-linux-musl
      # - name: Install tursodb
      #   run: cargo install turso_cli --git https://github.com/tursodatabase/turso --tag v0.5.3
      - name: Install tursodb
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/tursodatabase/turso/releases/download/v0.5.3/turso_cli-installer.sh | sh
      - uses: actions/checkout@v6
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Check code formatting
        run: cargo fmt --check
      - name: Code linting
        run: cargo clippy -- -D warnings
      - name: Run tests
        run: cargo test --verbose
      - name: Build fs postgres and redis version
        run: cargo build --release --verbose -p lipl-storage-server
